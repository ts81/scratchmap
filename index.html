<!DOCTYPE html>
<html lang="de">

<head>
	<base target="_top">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<title>Scratch Map</title>

	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
		integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
		integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
	<script src="geo/countries.js"></script>
	<script src="data/visited.js"></script>
	<script src="data/cities.js"></script>

	<style>
		html,
		body {
			height: 100%;
			width: 100%;
			margin: 0;
			padding: 0;
			overflow: hidden;
		}

		#map {
			width: 100%;
			height: 100%;
		}

		.leaflet-container {
			width: 100%;
			height: 100%;
			background: #aad3df;
			/* Wasserfarbe passend zur Karte */
		}

		.leaflet-interactive {
			transition: fill 0.4s ease, fill-opacity 0.4s ease, stroke 0.4s ease;
		}
	</style>
</head>

<body>

	<div id="map"></div>
	<script>
		// Farben & Transparenz
		const COLORS = {
			visited: '#bbf7d0',        // Ein angenehmes Grün für besuchte Länder
			visitedHover: '#86efac',
			visitedOutline: '#4ade80',
			unvisitedOutline: '#94a3b8',
			opacityUnvisited: 0,       // Komplett durchsichtig wie gewünscht
			opacityVisited: 0.6,       // Leicht deckend, um besuchte Länder zu markieren
		};

		const visitedCountries = new Set(VISITED_COUNTRIES);

		// Leaflet Standard-Icon Pfade fixen (für CDN Nutzung)
		delete L.Icon.Default.prototype._getIconUrl;
		L.Icon.Default.mergeOptions({
			iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
			iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
			shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
		});

		const map = L.map('map', {
			worldCopyJump: true,
			zoomControl: false // Wir fügen ihn gleich rechts unten ein
		});

		L.control.zoom({ position: 'bottomright' }).addTo(map);

		// Basiskarte: Politische Weltkarte ohne Labels
		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
			maxZoom: 19,
			attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
		}).addTo(map);

		// Eigene Ebene (Pane) für Labels, damit sie IMMER oben liegen
		map.createPane('labels');
		map.getPane('labels').style.zIndex = 650;
		map.getPane('labels').style.pointerEvents = 'none';

		L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_only_labels/{z}/{x}/{y}{r}.png', {
			maxZoom: 19,
			pane: 'labels'
		}).addTo(map);

		function isVisited(feature) {
			return visitedCountries.has(feature.id);
		}

		function style(feature) {
			const visited = isVisited(feature);
			return {
				fillColor: visited ? COLORS.visited : 'transparent',
				fillOpacity: visited ? COLORS.opacityVisited : COLORS.opacityUnvisited,
				stroke: true,
				color: visited ? COLORS.visitedOutline : COLORS.unvisitedOutline,
				weight: visited ? 1 : 0.5,
				opacity: visited ? 1 : 0.3,
			};
		}

		function highlightFeature(e) {
			const layer = e.target;
			const visited = isVisited(layer.feature);

			layer.setStyle({
				fillColor: visited ? COLORS.visitedHover : '#94a3b8',
				fillOpacity: visited ? 0.8 : 0.2,
				stroke: true,
				weight: visited ? 2 : 1,
				opacity: 1
			});
		}

		function resetHighlight(e) {
			countriesLayer.resetStyle(e.target);
		}

		function zoomToFeature(e) {
			map.fitBounds(e.target.getBounds());
		}

		function onEachFeature(feature, layer) {
			const name = feature.properties.name;
			const status = isVisited(feature) ? 'Besucht' : 'Noch nicht besucht';

			layer.bindPopup('<strong>' + name + '</strong><br>' + status);

			layer.on({
				mouseover: highlightFeature,
				mouseout: resetHighlight,
				click: zoomToFeature,
			});
		}

		const countriesLayer = L.geoJSON(COUNTRIES_GEOJSON, {
			style: style,
			onEachFeature: onEachFeature,
		}).addTo(map);

		// --- NEU: Städte-Ebene ---
		const citiesLayer = L.layerGroup().addTo(map);

		VISITED_CITIES.forEach(city => {
			const marker = L.marker([city.lat, city.lng]);

			marker.bindPopup('<strong>' + city.name + '</strong>' + (city.date ? '<br>Besucht am: ' + city.date : ''));

			marker.addTo(citiesLayer);
		});

		map.fitWorld();
	</script>

</body>

</html>
